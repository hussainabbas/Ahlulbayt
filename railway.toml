# Monorepo: build from repo root using ./Dockerfile (copies api/).
# Alternative: set Service → Root Directory = api (uses api/Dockerfile).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node dist/main.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
preDeployCommand = "node scripts/apply-migrations.mjs && node scripts/seed-admin-user.mjs"
