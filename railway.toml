# Monorepo: API lives in api/ — Railway must build from api/Dockerfile.
# If deploy still fails, set Service → Settings → Root Directory = api
# (then api/railway.toml is used instead of this file).

[build]
builder = "DOCKERFILE"
dockerfilePath = "api/Dockerfile"

[deploy]
startCommand = "node dist/main.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
preDeployCommand = "node scripts/apply-migrations.mjs && node scripts/seed-admin-user.mjs"
